<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
body{background:#020617;color:white;text-align:center;padding-top:100px;font-family:sans-serif;}
input{padding:10px;margin:10px;border-radius:8px;border:none;}
button{padding:10px 20px;background:#6366f1;color:white;border:none;border-radius:10px;}
</style>
</head>

<body>

<h2>🔐 Game of Luck</h2>

<input id="email" placeholder="Enter Email"><br>
<button onclick="send()">Send OTP</button><br>

<input id="otp" placeholder="Enter OTP"><br>
<button onclick="verify()">Login</button>

<script>
const API = "https://script.google.com/macros/s/AKfycbw_tlddD7MnSrIFo1fKEKyMFNerKVNgmqxkPGc6S2tsYEUKF_tPUhJf67MQYBXgD18c/exec";

function send(){
  const emailVal = document.getElementById("email").value;

  if(!emailVal){
    alert("Enter email first");
    return;
  }

  const win = window.open(API + `?action=sendOTP&email=${emailVal}`, "_blank");

  setTimeout(()=>{ win.close(); }, 2000);

  alert("✅ OTP Sent");
}

function verify(){
  const emailVal = document.getElementById("email").value;
  const otpVal = document.getElementById("otp").value;

  fetch(API + `?action=verifyOTP&email=${emailVal}&otp=${otpVal}`)
  .then(r => r.json())
  .then(d => {

    if(d.status){

      // 🔥 GET USER ID
      fetch(API + `?action=getUser&email=${emailVal}`)
      .then(r=>r.json())
      .then(u=>{

        localStorage.setItem("userId", u.userId);
        localStorage.setItem("wallet", u.wallet);

        alert("✅ Login Success");
        location.href="index.html";

      });

    } else {
      alert("❌ Wrong OTP");
    }

  });
}
</script>

</body>
</html>
