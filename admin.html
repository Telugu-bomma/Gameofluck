<!DOCTYPE html>
<html>
<body>

<h2>Admin Panel</h2>

<input id="lotId" placeholder="Lot ID">
<input id="pass" placeholder="Password">

<button onclick="draw()">Draw Winner</button>

<div id="res"></div>

<script>
const API = "https://script.google.com/macros/s/AKfycbw_tlddD7MnSrIFo1fKEKyMFNerKVNgmqxkPGc6S2tsYEUKF_tPUhJf67MQYBXgD18c/exec";

function draw(){
 fetch(API+`?action=draw&lotId=${lotId.value}`)
 .then(r=>r.json())
 .then(d=>{
   document.getElementById("res").innerHTML=
   "Winner: "+d.userId+" Code: "+d.code;
 });
}
</script>

</body>
</html>
