<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Game of Luck</title>

<style>
body{
  background:#0f172a;
  color:white;
  font-family:sans-serif;
  text-align:center;
}

.card{
  background:#1e293b;
  padding:20px;
  margin:15px;
  border-radius:15px;
}

button{
  background:#22c55e;
  border:none;
  padding:10px 20px;
  border-radius:10px;
  color:white;
}
</style>
</head>

<body>

<h1>🎰 Game of Luck</h1>

<div class="card">
💰 Wallet: ₹<span id="wallet">0</span>
</div>

<div id="lots"></div>

<script>
const API = "YOUR_GAS_URL";
const userId = localStorage.getItem("userId") || "U001";

function loadLots(){
 fetch(API+"?action=getLots")
 .then(r=>r.json())
 .then(data=>{
   let html="";
   data.forEach(l=>{
     html += `
     <div class="card">
       ${l.name}<br>
       ₹${l.price}<br>
       <button onclick="buy('${l.id}')">Buy</button>
     </div>`;
   });
   document.getElementById("lots").innerHTML = html;
 });
}

function buy(id){
 fetch(API+`?action=buy&userId=${userId}&lotId=${id}`)
 .then(r=>r.json())
 .then(d=>{
   if(d.error) alert(d.error);
   else alert("🎟 Code: "+d.code);
 });
}

loadLots();
</script>

</body>
</html>
